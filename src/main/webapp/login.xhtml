<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">
    <ui:composition template="/WEB-INF/templates/layout.xhtml">
        <ui:define name="stylesheets">
            <h:outputStylesheet library="css" name="loginStyle.css"/>
        </ui:define>
    
        <ui:define name="main">
            <h:form styleClass="loginForm">
                <p:panelGrid columns="1">
                    <f:facet name="header">
                        #{locale.LOGIN_TITLE}
                    </f:facet>
                    
                    <p:column>
                        <p:outputLabel for="@next" value="#{locale.FORM_USERNAME}" styleClass="loginLabel"/>
                        <p:inputText value="#{sessionBean.username}" placeholder="#{locale.FORM_USERNAME}" title="#{locale.FORM_USERNAME}" required="true" requiredMessage="#{locale.FORM_REQUIREDMSG}" styleClass="loginInputField"/>
                    </p:column>

                    <p:column>
                        <p:outputLabel for="@next" value="#{locale.FORM_PASSWORD}" styleClass="loginLabel"/>
                        <p:password value="#{sessionBean.password}" placeholder="#{locale.FORM_PASSWORD}" title="#{locale.FORM_PASSWORD}" toggleMask="true" required="true" requiredMessage="#{locale.FORM_REQUIREDMSG}" styleClass="loginInputField"/>
                    </p:column>

                    <p:column styleClass="loginButtonColumn">
                        <p:commandButton value="#{locale.LOGIN_TITLE}" title="#{locale.LOGIN_TITLE}" action="#{sessionBean.login()}" update="id_growl @form"/>
                    </p:column>
                </p:panelGrid>
            </h:form>
        </ui:define>
    </ui:composition>
</html>
